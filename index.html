<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选择创作者</title>
  <meta name="description" content="时雨榧 · 浮游Lev 个人作品页" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body>
  <main class="portal">
    <header class="portal-head">
      <h1>选择要查看的页面</h1>
      <p>两位创作者的 B 站投稿同步展示，请选一位进入。</p>
    </header>

    <div class="portal-grid">
      <a href="shiyuki/" class="portal-card">
        <img src="shiyuki/assets/images/avatar.jpg" alt="时雨榧" width="96" height="96" loading="eager" />
        <h2>时雨榧</h2>
        <p>手书 · 视频制作</p>
        <span class="portal-go">进入 →</span>
      </a>

      <a href="komowata/" class="portal-card">
        <img src="komowata/assets/images/avatar.jpg" alt="浮游Lev" width="96" height="96" loading="eager" />
        <h2>浮游Lev</h2>
        <p>插画 · 绘画过程</p>
        <span class="portal-go">进入 →</span>
      </a>
    </div>
  </main>
</body>
</html>
