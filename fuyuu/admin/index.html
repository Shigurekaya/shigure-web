<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <base href="/fuyuu/" />
  <title>作品集管理 · 浮游Lev</title>
  <link rel="icon" href="/fuyuu/assets/images/avatar.jpg" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #6ea8ff;
      --danger: #ff6b6b;
      --ok: #5cdb8a;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"], input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0d0d0d;
      color: var(--text);
      font-size: 0.95rem;
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .row > * { flex: 1; min-width: 180px; }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .preview {
      margin-top: 12px;
      max-height: 200px;
      border-radius: 6px;
      display: none;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.88rem;
      display: none;
    }
    .status.ok { display: block; background: rgba(92,219,138,0.12); color: var(--ok); }
    .status.err { display: block; background: rgba(255,107,107,0.12); color: var(--danger); }
    .status.info { display: block; background: rgba(110,168,255,0.12); color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .item {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #0d0d0d;
    }
    .item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .item-meta {
      padding: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.3;
    }
    .item-actions {
      display: flex;
      gap: 6px;
      padding: 0 8px 8px;
    }
    .item-actions button { flex: 1; padding: 6px; font-size: 0.75rem; }
    .badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .login-gate { max-width: 420px; }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>浮游 · 作品集管理</h1>
    <p class="sub">上传或删除插画，新作品自动排在最前。提交后约 1–2 分钟 Vercel 重新部署后生效。</p>

    <div id="login-gate" class="card login-gate">
      <label for="token">管理密钥</label>
      <input type="password" id="token" placeholder="FUYUU_ADMIN_TOKEN" autocomplete="current-password" />
      <p class="hint">密钥保存在浏览器本地，登录时发送至本站 API 验证，不会发送给第三方。</p>
      <div id="login-status" class="status"></div>
      <div style="margin-top:14px">
        <button class="btn-primary" id="btn-login">进入管理</button>
      </div>
    </div>

    <div id="panel" hidden>
      <div class="card">
        <h2 style="margin:0 0 16px;font-size:1rem">上传新作品</h2>
        <div class="row">
          <div>
            <label for="filename">文件名（不含扩展名，支持中文）</label>
            <input type="text" id="filename" placeholder="例：新作品名" />
          </div>
          <div>
            <label for="file">图片文件（JPG/PNG，≤8MB）</label>
            <input type="file" id="file" accept="image/jpeg,image/png,image/webp" />
          </div>
        </div>
        <img id="preview" class="preview" alt="预览" />
        <div style="margin-top:14px;display:flex;gap:10px">
          <button class="btn-primary" id="btn-upload">上传并置于最前</button>
          <button class="btn-ghost" id="btn-logout">退出</button>
        </div>
        <div id="upload-status" class="status"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h2 style="margin:0;font-size:1rem">当前作品集 (<span id="count">0</span>)</h2>
          <button class="btn-ghost" id="btn-refresh">刷新</button>
        </div>
        <div id="grid" class="grid"></div>
        <div id="list-status" class="status"></div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "fuyuu_admin_token";
    const API_GALLERY = "/api/fuyuu/gallery/";
    const API_UPLOAD = "/api/fuyuu/upload/";

    const $ = (id) => document.getElementById(id);

    function token() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function headers() {
      return {
        Authorization: "Bearer " + token(),
        "Content-Type": "application/json",
      };
    }

    function showStatus(el, msg, type) {
      el.textContent = msg;
      el.className = "status " + type;
    }

    function clearStatus(el) {
      el.textContent = "";
      el.className = "status";
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, options);
      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error(`服务器响应异常 (${res.status})`);
      }
      if (!res.ok || !data.ok) {
        throw new Error(data.error || `请求失败 (${res.status})`);
      }
      return data;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(",")[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    function renderGalleryItem(item, index) {
      const div = document.createElement("div");
      div.className = "item";

      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = `#${index + 1}`;

      const img = document.createElement("img");
      img.src = item.thumb;
      img.alt = "";
      img.loading = "lazy";
      img.addEventListener("error", () => { img.src = item.image; });

      const meta = document.createElement("div");
      meta.className = "item-meta";
      meta.textContent = item.path;

      const actions = document.createElement("div");
      actions.className = "item-actions";

      const btnTop = document.createElement("button");
      btnTop.className = "btn-ghost btn-top";
      btnTop.textContent = "置顶";
      btnTop.addEventListener("click", () => moveTop(item.path));

      const btnDel = document.createElement("button");
      btnDel.className = "btn-danger btn-del";
      btnDel.textContent = "删除";
      btnDel.addEventListener("click", () => deleteItem(item.path));

      actions.append(btnTop, btnDel);
      div.append(badge, img, meta, actions);
      return div;
    }

    async function loadGallery() {
      const status = $("list-status");
      clearStatus(status);
      const data = await apiFetch(API_GALLERY, { headers: headers() });
      $("count").textContent = data.total;
      const grid = $("grid");
      grid.replaceChildren();
      data.items.forEach((item, i) => {
        grid.appendChild(renderGalleryItem(item, i));
      });
    }

    async function deleteItem(path) {
      if (!confirm("确定删除 " + path + "？\n此操作会从 GitHub 仓库移除原图与缩略图。")) return;
      const status = $("list-status");
      showStatus(status, "删除中…", "info");
      try {
        const data = await apiFetch(API_GALLERY, {
          method: "DELETE",
          headers: headers(),
          body: JSON.stringify({ path }),
        });
        showStatus(status, data.message + " commit: " + data.commitSha.slice(0, 7), "ok");
        await loadGallery();
      } catch (e) {
        showStatus(status, e.message, "err");
      }
    }

    async function moveTop(path) {
      const status = $("list-status");
      showStatus(status, "调整顺序…", "info");
      try {
        await apiFetch(API_GALLERY, {
          method: "PATCH",
          headers: headers(),
          body: JSON.stringify({ path, index: 0 }),
        });
        showStatus(status, "已置顶", "ok");
        await loadGallery();
      } catch (e) {
        showStatus(status, e.message, "err");
      }
    }

    async function upload() {
      const file = $("file").files[0];
      const filename = $("filename").value.trim();
      const status = $("upload-status");
      if (!file) {
        showStatus(status, "请选择图片", "err");
        return;
      }
      if (file.size > 8 * 1024 * 1024) {
        showStatus(status, "图片超过 8MB", "err");
        return;
      }
      const name = filename || file.name.replace(/\.[^.]+$/, "");
      showStatus(status, "上传中（含 GitHub 提交）…", "info");
      $("btn-upload").disabled = true;
      try {
        const imageBase64 = await fileToBase64(file);
        const data = await apiFetch(API_UPLOAD, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ filename: name, imageBase64 }),
        });
        showStatus(status, data.message + " → " + data.path, "ok");
        $("file").value = "";
        $("filename").value = "";
        $("preview").style.display = "none";
        await loadGallery();
      } catch (e) {
        showStatus(status, e.message, "err");
      } finally {
        $("btn-upload").disabled = false;
      }
    }

    async function enterPanel() {
      const t = $("token").value.trim();
      const loginStatus = $("login-status");
      if (!t) {
        showStatus(loginStatus, "请输入管理密钥", "err");
        return;
      }
      clearStatus(loginStatus);
      $("btn-login").disabled = true;
      localStorage.setItem(TOKEN_KEY, t);
      try {
        await loadGallery();
        $("login-gate").hidden = true;
        $("panel").hidden = false;
      } catch (e) {
        localStorage.removeItem(TOKEN_KEY);
        const msg =
          e.message === "未授权" ? "密钥错误或已失效"
          : e.message === "FUYUU_ADMIN_TOKEN 未配置" ? "服务端未配置管理密钥，请在 Vercel 添加 FUYUU_ADMIN_TOKEN"
          : e.message;
        showStatus(loginStatus, msg, "err");
      } finally {
        $("btn-login").disabled = false;
      }
    }

    $("btn-login").addEventListener("click", () => { enterPanel(); });
    $("token").addEventListener("keydown", (e) => { if (e.key === "Enter") enterPanel(); });
    $("btn-logout").addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      location.reload();
    });
    $("btn-upload").addEventListener("click", upload);
    $("btn-refresh").addEventListener("click", async () => {
      try {
        await loadGallery();
      } catch (e) {
        showStatus($("list-status"), e.message, "err");
      }
    });
    $("file").addEventListener("change", () => {
      const f = $("file").files[0];
      const img = $("preview");
      if (!f) { img.style.display = "none"; return; }
      img.src = URL.createObjectURL(f);
      img.style.display = "block";
      if (!$("filename").value.trim()) {
        $("filename").value = f.name.replace(/\.[^.]+$/, "");
      }
    });

    if (token()) {
      $("token").value = token();
      enterPanel();
    }
  </script>
</body>
</html>
