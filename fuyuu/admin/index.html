<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <base href="/fuyuu/" />
  <title>作品集管理 · 浮游Lev</title>
  <link rel="icon" href="../assets/images/avatar.jpg" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #6ea8ff;
      --danger: #ff6b6b;
      --ok: #5cdb8a;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"], input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0d0d0d;
      color: var(--text);
      font-size: 0.95rem;
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .row > * { flex: 1; min-width: 180px; }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .preview {
      margin-top: 12px;
      max-height: 200px;
      border-radius: 6px;
      display: none;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.88rem;
      display: none;
    }
    .status.ok { display: block; background: rgba(92,219,138,0.12); color: var(--ok); }
    .status.err { display: block; background: rgba(255,107,107,0.12); color: var(--danger); }
    .status.info { display: block; background: rgba(110,168,255,0.12); color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .item {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #0d0d0d;
    }
    .item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .item-meta {
      padding: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.3;
    }
    .item-actions {
      display: flex;
      gap: 6px;
      padding: 0 8px 8px;
    }
    .item-actions button { flex: 1; padding: 6px; font-size: 0.75rem; }
    .badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .login-gate { max-width: 420px; }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>浮游 · 作品集管理</h1>
    <p class="sub">上传或删除插画，新作品自动排在最前。提交后约 1–2 分钟 Vercel 重新部署后生效。</p>

    <div id="login-gate" class="card login-gate">
      <label for="token">管理密钥</label>
      <input type="password" id="token" placeholder="FUYUU_ADMIN_TOKEN" autocomplete="current-password" />
      <p class="hint">密钥保存在浏览器本地，仅用于调用 API，不会上传到第三方。</p>
      <div style="margin-top:14px">
        <button class="btn-primary" id="btn-login">进入管理</button>
      </div>
    </div>

    <div id="panel" hidden>
      <div class="card">
        <h2 style="margin:0 0 16px;font-size:1rem">上传新作品</h2>
        <div class="row">
          <div>
            <label for="filename">文件名（不含扩展名，支持中文）</label>
            <input type="text" id="filename" placeholder="例：新作品名" />
          </div>
          <div>
            <label for="file">图片文件（JPG/PNG，≤8MB）</label>
            <input type="file" id="file" accept="image/jpeg,image/png,image/webp" />
          </div>
        </div>
        <img id="preview" class="preview" alt="预览" />
        <div style="margin-top:14px;display:flex;gap:10px">
          <button class="btn-primary" id="btn-upload">上传并置于最前</button>
          <button class="btn-ghost" id="btn-logout">退出</button>
        </div>
        <div id="upload-status" class="status"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h2 style="margin:0;font-size:1rem">当前作品集 (<span id="count">0</span>)</h2>
          <button class="btn-ghost" id="btn-refresh">刷新</button>
        </div>
        <div id="grid" class="grid"></div>
        <div id="list-status" class="status"></div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "fuyuu_admin_token";
    const API_BASE = "/api/fuyuu";

    const $ = (id) => document.getElementById(id);

    function token() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function headers() {
      return {
        Authorization: "Bearer " + token(),
        "Content-Type": "application/json",
      };
    }

    function showStatus(el, msg, type) {
      el.textContent = msg;
      el.className = "status " + type;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(",")[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    async function loadGallery() {
      const status = $("list-status");
      status.className = "status";
      try {
        const res = await fetch(API_BASE + "/gallery");
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "加载失败");
        $("count").textContent = data.total;
        const grid = $("grid");
        grid.innerHTML = "";
        data.items.forEach((item, i) => {
          const div = document.createElement("div");
          div.className = "item";
          div.innerHTML = `
            <span class="badge">#${i + 1}</span>
            <img src="${item.thumb}" alt="" loading="lazy"
                 onerror="this.src='${item.image}'" />
            <div class="item-meta">${item.path}</div>
            <div class="item-actions">
              <button class="btn-ghost btn-top" data-path="${item.path}">置顶</button>
              <button class="btn-danger btn-del" data-path="${item.path}">删除</button>
            </div>`;
          grid.appendChild(div);
        });
        grid.querySelectorAll(".btn-del").forEach((btn) => {
          btn.addEventListener("click", () => deleteItem(btn.dataset.path));
        });
        grid.querySelectorAll(".btn-top").forEach((btn) => {
          btn.addEventListener("click", () => moveTop(btn.dataset.path));
        });
      } catch (e) {
        showStatus(status, e.message, "err");
      }
    }

    async function deleteItem(path) {
      if (!confirm("确定删除 " + path + "？\n此操作会从 GitHub 仓库移除原图与缩略图。")) return;
      const status = $("list-status");
      showStatus(status, "删除中…", "info");
      try {
        const res = await fetch(API_BASE + "/gallery", {
          method: "DELETE",
          headers: headers(),
          body: JSON.stringify({ path }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "删除失败");
        showStatus(status, data.message + " commit: " + data.commitSha.slice(0, 7), "ok");
        await loadGallery();
      } catch (e) {
        showStatus(status, e.message, "err");
      }
    }

    async function moveTop(path) {
      const status = $("list-status");
      showStatus(status, "调整顺序…", "info");
      try {
        const res = await fetch(API_BASE + "/gallery", {
          method: "PATCH",
          headers: headers(),
          body: JSON.stringify({ path, index: 0 }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "操作失败");
        showStatus(status, "已置顶", "ok");
        await loadGallery();
      } catch (e) {
        showStatus(status, e.message, "err");
      }
    }

    async function upload() {
      const file = $("file").files[0];
      const filename = $("filename").value.trim();
      const status = $("upload-status");
      if (!file) {
        showStatus(status, "请选择图片", "err");
        return;
      }
      if (file.size > 8 * 1024 * 1024) {
        showStatus(status, "图片超过 8MB", "err");
        return;
      }
      const name = filename || file.name.replace(/\.[^.]+$/, "");
      showStatus(status, "上传中（含 GitHub 提交）…", "info");
      $("btn-upload").disabled = true;
      try {
        const imageBase64 = await fileToBase64(file);
        const res = await fetch(API_BASE + "/upload", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ filename: name, imageBase64 }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "上传失败");
        showStatus(status, data.message + " → " + data.path, "ok");
        $("file").value = "";
        $("filename").value = "";
        $("preview").style.display = "none";
        await loadGallery();
      } catch (e) {
        showStatus(status, e.message, "err");
      } finally {
        $("btn-upload").disabled = false;
      }
    }

    function enterPanel() {
      const t = $("token").value.trim();
      if (!t) return;
      localStorage.setItem(TOKEN_KEY, t);
      $("login-gate").hidden = true;
      $("panel").hidden = false;
      loadGallery();
    }

    $("btn-login").addEventListener("click", enterPanel);
    $("token").addEventListener("keydown", (e) => { if (e.key === "Enter") enterPanel(); });
    $("btn-logout").addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      location.reload();
    });
    $("btn-upload").addEventListener("click", upload);
    $("btn-refresh").addEventListener("click", loadGallery);
    $("file").addEventListener("change", () => {
      const f = $("file").files[0];
      const img = $("preview");
      if (!f) { img.style.display = "none"; return; }
      img.src = URL.createObjectURL(f);
      img.style.display = "block";
      if (!$("filename").value.trim()) {
        $("filename").value = f.name.replace(/\.[^.]+$/, "");
      }
    });

    if (token()) {
      $("token").value = token();
      enterPanel();
    }
  </script>
</body>
</html>
